---
- name: Verificar instalación de Notepad++
  hosts: all
  gather_facts: false

  tasks:

    - name: Buscar Notepad++ instalado
      ansible.windows.win_shell: |

        $results = @()

        $registryPaths = @(
            "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\*",
            "HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\*",
            "HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\*"
        )

        foreach ($path in $registryPaths) {

            $apps = Get-ItemProperty $path -ErrorAction SilentlyContinue |
                Where-Object { $_.DisplayName -like "Notepad++*" }

            foreach ($app in $apps) {

                Write-Output "FOUND"
                Write-Output "Name=$($app.DisplayName)"
                Write-Output "Version=$($app.DisplayVersion)"
                Write-Output "Publisher=$($app.Publisher)"
                Write-Output "Location=$($app.InstallLocation)"
                Write-Output "-----"
            }
        }

        if ($LASTEXITCODE -ne 0) {
            exit 0
        }

      register: npp

      changed_when: false
      failed_when: false

    #######################################################################

    - name: Mostrar resultado cuando NO está instalado
      debug:
        msg:
          - "=================================================="
          - "Servidor   : {{ inventory_hostname }}"
          - "Aplicación : Notepad++"
          - "Estado     : NO INSTALADO"
          - "=================================================="
      when: "'FOUND' not in npp.stdout"

    #######################################################################

    - name: Mostrar resultado cuando está instalado
      debug:
        msg: |
          ==================================================
          Servidor   : {{ inventory_hostname }}
          Aplicación : Notepad++
          Estado     : INSTALADO

          {{ npp.stdout }}

          ==================================================
      when: "'FOUND' in npp.stdout"
