---
- name: Windows Health Check
  hosts: all
  gather_facts: yes

  tasks:

    #####################################################################
    # Información del sistema operativo
    #####################################################################

    - name: Obtener información del sistema
      ansible.windows.win_shell: |
        $os = Get-CimInstance Win32_OperatingSystem
        $cs = Get-CimInstance Win32_ComputerSystem
        $bios = Get-CimInstance Win32_BIOS
        $cpu = Get-CimInstance Win32_Processor | Select-Object -First 1

        [PSCustomObject]@{
            ComputerName = $env:COMPUTERNAME
            Caption = $os.Caption
            Version = $os.Version
            Build = $os.BuildNumber
            Manufacturer = $cs.Manufacturer
            Model = $cs.Model
            RAMGB = [Math]::Round($cs.TotalPhysicalMemory / 1GB,2)
            CPU = $cpu.Name
            LastBoot = $os.LastBootUpTime
            BIOS = $bios.SMBIOSBIOSVersion
        } | ConvertTo-Json -Compress
      register: system_info

    - name: Convertir información del sistema
      set_fact:
        system: "{{ system_info.stdout | from_json }}"

    #####################################################################
    # Información de discos
    #####################################################################

    - name: Obtener discos
      ansible.windows.win_shell: |
        Get-CimInstance Win32_LogicalDisk -Filter "DriveType=3" |
        Select-Object DeviceID,
                      @{Name='SizeGB';Expression={[math]::Round($_.Size/1GB,2)}},
                      @{Name='FreeGB';Expression={[math]::Round($_.FreeSpace/1GB,2)}},
                      @{Name='FreePercent';Expression={[math]::Round(($_.FreeSpace/$_.Size)*100,1)}} |
        ConvertTo-Json
      register: disks

    #####################################################################
    # Estado Windows Update
    #####################################################################

    - name: Consultar servicio Windows Update
      ansible.windows.win_service:
        name: wuauserv
      register: wuauserv

    #####################################################################
    # Buscar actualizaciones
    #####################################################################

    - name: Buscar actualizaciones disponibles
      ansible.windows.win_updates:
        state: searched
      register: updates

    #####################################################################
    # Resumen
    #####################################################################

    - name: Mostrar resumen
      debug:
        msg:
          - "=========================================================="
          - "Equipo               : {{ system.ComputerName }}"
          - "Sistema Operativo    : {{ system.Caption }}"
          - "Versión              : {{ system.Version }}"
          - "Build                : {{ system.Build }}"
          - "Fabricante           : {{ system.Manufacturer }}"
          - "Modelo               : {{ system.Model }}"
          - "CPU                  : {{ system.CPU }}"
          - "RAM                  : {{ system.RAMGB }} GB"
          - "BIOS                 : {{ system.BIOS }}"
          - "Último Reinicio      : {{ system.LastBoot }}"
          - "Windows Update       : {{ wuauserv.state }}"
          - "Actualizaciones      : {{ updates.found_update_count | default(0) }}"
          - "Reinicio requerido   : {{ updates.reboot_required | default(false) }}"
          - "=========================================================="

    #####################################################################
    # Discos
    #####################################################################

    - name: Mostrar información de discos
      debug:
        msg:
          - "Unidad      : {{ item.DeviceID }}"
          - "Tamaño      : {{ item.SizeGB }} GB"
          - "Libre       : {{ item.FreeGB }} GB"
          - "Libre (%)   : {{ item.FreePercent }} %"
      loop: "{{ (disks.stdout | from_json) if disks.stdout.startswith('[') else [disks.stdout | from_json] }}"

    #####################################################################
    # Actualizaciones
    #####################################################################

    - name: Mostrar actualizaciones pendientes
      debug:
        msg:
          - "Título      : {{ item.value.title }}"
          - "KB          : {{ item.value.kb | default('N/A') }}"
          - "Categorías  : {{ item.value.categories | join(', ') }}"
      loop: "{{ updates.updates | default({}) | dict2items }}"
      when: updates.found_update_count | default(0) > 0

    - name: Equipo actualizado
      debug:
        msg: "No hay actualizaciones pendientes."
      when: updates.found_update_count | default(0) == 0
